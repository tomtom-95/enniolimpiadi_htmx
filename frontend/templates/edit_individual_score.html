<div id="modal" _="on closeModal from body remove me
                   on 'sse:status-update' from body remove me">
    <div class="modal-underlay" _="on click trigger closeModal on body"></div>
    <div class="modal-content" _="on click halt the event's bubbling">
        <h3>{{ participant_name }}</h3>
        <form hx-put="/api/events/{{ event_id }}/matches/{{ match_id }}/individual-score"
              _="on htmx:afterOnLoad trigger closeModal on body">
            <input type="hidden" name="participant_id" value="{{ participant_id }}">
            <div class="score-modal-inputs">
                <span class="score-modal-name">{{ participant_name }}</span>
                <input type="number"
                    name="score"
                    value="{{ score if score is not none else '' }}"
                    min="0" autofocus class="modal-score-input">
            </div>
            <div class="modal-actions">
                <button type="button"
                    class="btn-cancel"
                    _="on click trigger closeModal on body">
                    Annulla
                </button>
                <button type="submit"
                    class="btn-submit">
                    Ok
                </button>
            </div>
        </form>
    </div>
</div>
